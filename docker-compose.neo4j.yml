services:
  neo4j:
    image: neo4j:5.26.22
    container_name: game-core-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/review-games-dev}
      NEO4J_dbms_default__database: ${NEO4J_DATABASE:-neo4j}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL_SIZE:-512m}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX_SIZE:-512m}
      NEO4J_server_bolt_advertised__address: ${NEO4J_BOLT_ADVERTISED_ADDRESS:-localhost:7687}
      NEO4J_server_http_advertised__address: ${NEO4J_HTTP_ADVERTISED_ADDRESS:-localhost:7474}
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  neo4j-data:
  neo4j-logs:
